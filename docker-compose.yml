# ============================================================
# docker-compose.yml — parking tracker local development stack
# ============================================================
# Defines two services:
#   db  — PostgreSQL 16 database
#   web — Django application (parking tracker)
#
# HOW TO USE:
#   1. Copy .env.example to .env and fill in all values
#   2. docker-compose up --build   (first run — builds the image)
#   3. Visit http://localhost:8000/admin/
#
# Note: migrations run automatically via entrypoint.sh.
#       setup_defaults must be run manually the first time:
#       docker-compose exec web python manage.py setup_defaults
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # db — PostgreSQL 16
  # ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    # WHY no ports here?
    #   Exposing 5432 to the host allows any process on the developer's machine
    #   to connect to the database directly — convenient but insecure in shared
    #   or CI environments.  Services on the internal app_net network (e.g. 'web')
    #   can still reach 'db' by hostname.
    #   To connect from your laptop with psql/TablePlus, add a local override:
    #     docker-compose.override.yml:
    #       services:
    #         db:
    #           ports:
    #             - "5432:5432"

    # Health check: pg_isready exits 0 when Postgres accepts connections.
    # Used by 'web' depends_on so Django never attempts to migrate against
    # a Postgres that isn't ready yet.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - app_net

  # ──────────────────────────────────────────────────────────
  # web — Django application
  # ──────────────────────────────────────────────────────────
  web:
    build: .

    # Start the Django development server.
    # entrypoint.sh (from the Dockerfile ENTRYPOINT) runs first:
    #   1. Waits for Postgres to be ready
    #   2. Runs manage.py migrate
    #   3. exec's this command
    command: python manage.py runserver 0.0.0.0:8000

    env_file:
      - .env

    volumes:
      - .:/app
      - media:/app/media
      - staticfiles:/app/staticfiles

    ports:
      - "8000:8000"

    # condition: service_healthy waits for the db healthcheck to pass before
    # starting web.  This eliminates the race condition where Django tries to
    # migrate against a Postgres that is still initialising.
    depends_on:
      db:
        condition: service_healthy

    networks:
      - app_net

# ──────────────────────────────────────────────────────────
# Named volumes
# ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
  media:
  staticfiles:

# ──────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────
networks:
  app_net:
    driver: bridge
