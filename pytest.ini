[pytest]
# Tell pytest-django which Django settings module to load.
# This is the equivalent of setting DJANGO_SETTINGS_MODULE in the shell.
DJANGO_SETTINGS_MODULE = config.settings

# Pattern for test file discovery — pytest will find files matching this name.
python_files = test_*.py

# Default command-line options applied to every pytest run:
#   --tb=short  — compact traceback format (easier to read than the default)
addopts = --tb=short
